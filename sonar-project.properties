sonar.projectKey=beehive-dashboard
sonar.projectName=BeeHive Dashboard
sonar.organization=josmaryppirelag17

# Fuentes y tests
sonar.sources=src/
sonar.tests=tests/

# Excluir del análisis COMPLETO
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/src/lib/i18n/translations.ts

# Excluir SOLO del análisis de duplicación (CRUCIAL para tests + archivos grandes)
sonar.cpd.exclusions=\
  **/tests/**/*,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**/*,\
  **/src/lib/i18n/translations.ts

# Incluir tests para análisis (pero no para duplicación)
sonar.test.inclusions=\
  **/tests/**/*.test.ts,\
  **/tests/**/*.test.tsx,\
  **/__tests__/**/*

# Configuración de coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Excluir tests del coverage
sonar.coverage.exclusions=\
  **/tests/**/*,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/playwright-report/**/*,\
  **/test-results/**/*

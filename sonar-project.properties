sonar.projectKey=beehive-dashboard
sonar.projectName=BeeHive Dashboard
sonar.organization=josmaryppirelag17

# Fuentes (solo src/, tests excluidos completamente)
sonar.sources=src/

# Excluir del análisis COMPLETO
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/tests/**/*,\
  **/src/utils/translations.ts

# Excluir SOLO del análisis de duplicación
sonar.cpd.exclusions=\
  **/tests/**/*,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**/*,\
  **/src/utils/translations.ts

# Configuración de coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Excluir tests del coverage
sonar.coverage.exclusions=\
  **/tests/**/*,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/playwright-report/**/*,\
  **/test-results/**/*,\
  **/src/utils/translations.ts

sonar.sourceEncoding=UTF-8
